name: Bug report
description: Report a defect in @dateforge/react-calendar
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill out the form so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm ls @dateforge/react-calendar`
      placeholder: "1.4.3"
    validations:
      required: true
  - type: dropdown
    id: react
    attributes:
      label: React version
      options:
        - "19"
        - "18"
        - other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser + OS, or Node version for SSR
      placeholder: "Chrome 131 / macOS 15"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal repro. Stackblitz/CodeSandbox link preferred.
      placeholder: |
        1. Render `<Calendar mode="range" />`
        2. Click day 10, then 25
        3. Click day 10 again
        4. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Code snippet
      render: tsx
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues, workarounds tried.
