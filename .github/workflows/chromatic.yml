name: Chromatic

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

# Cancel in-progress runs when new commits land on the same ref, so a
# rapid sequence of pushes doesn't queue multiple snapshot uploads.
concurrency:
  group: chromatic-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    # Skip auto-generated changeset release PRs and dependabot PRs — they
    # don't touch stories and just re-run the snapshot for no visual delta.
    if: github.head_ref != 'changeset-release/main' && !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish to Chromatic
        uses: chromaui/action@84e0c70520cf012d7cbcd0d9677b4240f893e25e # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          onlyChanged: true
