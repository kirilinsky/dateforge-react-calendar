name: Chromatic

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs when new commits land on the same ref, so a
# rapid sequence of pushes doesn't queue multiple snapshot uploads.
concurrency:
  group: chromatic-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    # Skip auto-generated changeset release PRs and dependabot PRs — they
    # don't touch stories and just re-run the snapshot for no visual delta.
    # Same for the main-push builds those merges produce (dep bumps and
    # version-packages commits land as "chore(deps…"/"chore: version…").
    if: >-
      github.head_ref != 'changeset-release/main' &&
      !startsWith(github.head_ref, 'dependabot/') &&
      (github.event_name != 'push' ||
        (!startsWith(github.event.head_commit.message, 'chore(deps') &&
         !startsWith(github.event.head_commit.message, 'chore: version packages')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish to Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          onlyChanged: true
