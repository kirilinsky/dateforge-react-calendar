name: SSR

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ssr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test:ssr
