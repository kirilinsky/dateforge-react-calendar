name: SSR

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ssr:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test:ssr
