name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to latest (Trusted Publishing requires 11.5.1+)
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # Validates the tarball that `changesets/action` will later publish via
      # `npm publish`. Uses `npm pack` (no registry call) to avoid the
      # "cannot publish over previously published versions" error that
      # `npm publish --dry-run` raises before changesets has bumped the
      # version. Provides early packaging-failure detection.
      - name: Verify package tarball (npm pack)
        run: npm pack --dry-run

      - name: Create Release Pull Request or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
