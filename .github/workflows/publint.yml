name: Publint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run check:exports
